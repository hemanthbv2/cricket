  <script>
    const markdown = "# 🤖 Chatbot Flow — RV Schools (Verified Details)\n\n> All information below is extracted directly from the official school websites via deep page-by-page review.\n\n\n### 🚀 Live Deployments (Vercel)\n* **RV School (RVS):** [https://rvs-theta.vercel.app/](https://rvs-theta.vercel.app/)\n* **RV Public School (RVPS):** [https://rvps-chatbot.vercel.app/](https://rvps-chatbot.vercel.app/)\n* **RV Girls High School (RVGHS):** [https://rvghs.vercel.app/](https://rvghs.vercel.app/)\n\n---\n\n## 🏫 1. RV School (rvschool.edu.in)\n\n**Board:** Karnataka State Board | **Recognized by:** Government of Karnataka\n**Grades:** Primary & Secondary School (English Medium)\n**Established:** 2018\n**Campus:** 2 acres, Tata Silk Farm, Bengaluru\n**Principal:** Shakila R. (M.A., B.Ed.)\n**Website:** https://www.rvschool.edu.in/\n\n### Key Unique Facts\n| Feature | Detail |\n|---------|--------|\n| 🎯 USP | Inclusive education — specifically considers **special children with hearing impairment** |\n| 🏗️ Facilities | Amphitheater, Elevators, Food Court, **Splash Pool**, Sandpit, Enormous Playground |\n| 🚌 Transport | ❌ **No school bus service** |\n| 🍱 Mid-day Meals | ❌ **No mid-day meal program** (has Food Court instead) |\n| 📞 Phone | 080-26768583, +91-9036876175 |\n| 📧 Email | principal.rvs@rvei.edu.in |\n| 📍 Address | #16/17, 3rd Cross, Tata Silk Farm, Bengaluru - 560028 |\n| 🌐 Social | [Facebook](https://www.facebook.com/RVSchoolEdu/), [Instagram](https://www.instagram.com/rvschool_edu/) |\n\n### Chatbot Flow\n\n```mermaid\nflowchart TD\n    A[\"👋 Welcome to RV School!\\nEstablished 2018 | State Board\\nHow can I help you today?\"]\n\n    A --> B[\"📚 Admissions\"]\n    A --> C[\"🏫 About the School\"]\n    A --> D[\"💰 Fee Structure\"]\n    A --> E[\"📞 Contact Us\"]\n    A --> F[\"🎓 Academics\"]\n    A --> G[\"🖼️ Gallery & Campus\"]\n    A --> H[\"🤝 Alumni\"]\n    A --> I[\"❤️ Donate\"]\n    A --> J[\"♿ Inclusive Education\"]\n\n    %% ADMISSIONS\n    B --> B1[\"Which level are you\\nseeking admission for?\"]\n    B1 --> B1a[\"Primary School\"]\n    B1 --> B1b[\"Secondary School\"]\n    B1a --> B2[\"Admission requirements\\n+ Link to SAP Portal:\\nhttps://wds-prd.rvei.edu.in\"]\n    B1b --> B2\n    B2 --> B3[\"Would you like to:\\n1. Apply Now → SAP Portal\\n2. Book a Campus Visit\\n3. Call: 080-26768583\"]\n\n    %% ABOUT\n    C --> C1[\"RV School is part of RVEI\\n(Rashtreeya Sikshana Samithi Trust).\\nEst. 2018 | 2-acre campus\\nState Board | English Medium\\nPrincipal: Shakila R.\"]\n    C1 --> C2[\"Learn more about:\\n1. Vision & Mission\\n2. Management\\n3. Campus Infrastructure\"]\n    C2 --> C2a[\"Mission: Holistic development\\nof every child.\\nExcellence in education with\\nsocietal commitment.\"]\n    C2 --> C2b[\"President: Dr. M.P. Shyam\\nHon. Secretary: Dr. A.V.S. Murthy\\n→ Link to /management2/\"]\n    C2 --> C2c[\"Amphitheater, Splash Pool,\\nSandpit, Elevators,\\nEnormous Playground,\\nFood Court\"]\n\n    %% INCLUSIVE EDUCATION (UNIQUE)\n    J --> J1[\"RV School specifically supports\\nspecial children with\\nhearing impairment.\\nInclusive education is\\na core commitment.\"]\n    J1 --> J2[\"Want to know more?\\n1. Contact Admissions\\n2. Visit Campus\"]\n\n    %% FEE\n    D --> D1[\"Fee information for\\ncurrent academic year.\\nContact office for details.\"]\n    D1 --> D2[\"📞 080-26768583\\n📧 principal.rvs@rvei.edu.in\"]\n\n    %% CONTACT\n    E --> E1[\"📍 #16/17, 3rd Cross,\\nTata Silk Farm, Bengaluru - 560028\\n📞 080-26768583\\n📱 +91-9036876175\\n📧 principal.rvs@rvei.edu.in\"]\n\n    %% ACADEMICS\n    F --> F1[\"State Board Syllabus\\nPrograms: Art, Craft,\\nMusic, Dance, PE\"]\n\n    %% GALLERY\n    G --> G1[\"View campus gallery\\n→ /gallery/\"]\n\n    %% ALUMNI\n    H --> H1[\"Connect with alumni\\n→ /alumni/\"]\n\n    %% DONATE\n    I --> I1[\"Support RV School\\n→ /donate/\"]\n```\n\n### School-Specific FAQs\n| Question | Answer |\n|----------|--------|\n| \"Does RV School have a bus?\" | No, RV a SAP Portal\"]\n    B1b --> B2\n    B1c --> B2\n    B2 --> B3[\"Would you like to:\\n1. Apply Now → SAP Portal\\n2. Visit Campus\\n3. Call: 080-69757300\"]\n\n    %% ABOUT\n    C --> C1[\"RVPS is an ICSE school\\nunder RVEI/RSST Trust.\\nEst. 2003 | 2-acre campus\\nLalbagh West Gate, V V Puram\"]\n    C1 --> C2[\"1. Vision & Mission\\n2. British Council Award\\n3. Management\"]\n    C2 --> C2a[\"Unlocking the hidden potential\\nof every child through\\nacademics + extra-curricular\"]\n    C2 --> C2b[\"ISA British Council\\nInternational School Award\\nfor Outstanding International\\nDimension in Curriculum\"]\n    C2 --> C2c[\"President: Dr. M.P. Shyam\\nChairman: Naveen Pasuparthy\"]\n\n    %% TRANSPORT (UNIQUE)\n    I --> I1[\"✅ Yes! RVPS provides\\nsafe bus services along\\nselect routes of\\nSouth Bangalore.\"]\n    I1 --> I2[\"For routes & availability:\\n📞 080-69757300\\n📧 rvps@rvei.edu.in\"]\n\n    %% UNIFORM & TIMINGS\n    J --> J1[\"📋 School Timings:\\nNursery-UKG: 8:20 AM-12:15 PM\\nStd 1-10: 8:20 AM-3:15 PM\\nPTM: 3:20-3:45 PM daily\"]\n    J1 --> J2[\"👔 Uniform:\\nMon/Tue/Thu/Fri: Blue Pinafore/Shorts + Check Shirt\\nWed: House-coloured T-shirt + Track Pants\\nShoes: Black | Socks: Dark Blue\"]\n\n    %% FACILITIES\n    G --> G1[\"🏗️ Our facilities:\"]\n    G1 --> G1a[\"🔬 Physics, Chemistry,\\nBiology Labs\"]\n    G1 --> G1b[\"💻 Computer Lab\\n(CS from Class 1)\"]\n    G1 --> G1c[\"📚 Digitised Library\"]\n    G1 --> G1d[\"🏟️ Vast Playground\\nCricket, Basketball, Volleyball\\nPartner: Leapstart\"]\n    G1 --> G1e[\"🎭 State-of-art Auditorium\"]\n    G1 --> G1f[\"🏠 Edu-Smart Classrooms\"]\n\n    %% TOPPERS\n    F --> F1[\"ICSE Toppers:\\n🥇 Anirudh S: 97.2%\\n🥈 Pravardhinii S: 96.4%\\n🥉 Bhargav A: 95.7%\"]\n\n    %% CONTACT\n    H --> H1[\"📍 Opp Lalbagh West Gate,\\nV V Puram, Bangalore - 560004\\n📞 080-69757300\\n📧 rvps@rvei.edu.in\\n🕐 Mon-Fri: 8:45AM-4:30PM\\n🕐 Sat: 10:30AM-1:00PM\"]\n\n    %% FEE\n    E --> E1[\"Fee Office Hours:\\nWeekdays: 10AM-1PM\\nSaturday: 10:30AM-12:30PM\\n📞 080-69757300\"]\n\n    %% ACADEMICS\n    D --> D1[\"ICSE Curriculum\\nAcademic Year: June-April\"]\n    D1 --> D1a[\"🧒 Pre-Primary\\nNursery, LKG, UKG\"]\n    D1 --> D1b[\"📖 Primary: Std 1-7\\nCS training from Class 1\"]\n    D1 --> D1c[\"📘 Secondary: Std 8-10\\nICSE Board Exams\"]\n\n    %% NEWS\n    K --> K1[\"Recent Events:\\n🎓 Grade X Graduation\\n🤖 Robotics Exhibition\\n🎭 Annual Day 'Vivartana'\\n🧪 Science Olympiad\"]\n```\n\n### School-Specific FAQs\n| Question | Answer |\n|----------|--------|\n| \"Does RVPS have a school bus?\" | ✅ Yes! Safe bus services on select routes of South Bangalore. Call 080-69757300 for routes. |\n| \"What board does RVPS follow?\" | ICSE (CISCE). |\n| \"Do you serve mid-day meals?\" | No government mid-day meal program. |\n| \"Is there a swimming pool?\" | Not mentioned. Sports facilities include playground, cricket, basketball, volleyball via Leapstart partner. |\n| \"What are school timings?\" | Nursery–UKG: 8:20 AM–12:15 PM. Std 1–10: 8:20 AM–3:15 PM (Mon–Fri). |\n| \"What's the uniform?\" | Blue Pinafore/Shorts + Check Shirt (Mon/Tue/Thu/Fri). House T-shirt + Track Pants (Wed). |\n| \"Is RVPS British Council accredited?\" | Yes! ISA Award for Outstanding International Dimension in Curriculum. |\n| \"What are the houses?\" | Charaka, Aryabhatta, Bhaskara, Sushrutha. |\n| \"Do you have NCC?\" | Yes, RVPS has an active NCC unit. |\n| \"Can I meet a teacher daily?\" | Yes, PTM is 3:20–3:45 PM daily. |\n\n---\n\n## 🏫 3. RV Girls High School (rvghs.edu.in)\n\n**Board:** Karnataka State Board\n**Type:** Girls Only (High School)\n**Grades:** High School (Classes 8–10)\n**Established:** 7th June 1962\n**Students:** ~400 girls\n**Headmaster:** Mr. Devaru Bhat\n**Location:** Jayanagar, Bengaluru\n**Website:** https://rvghs.edu.in/\n**Tagline:** *\"Nurturing Growing Minds — Since 1962!\"*\n\n### Key Unique Facts\n| Feature | Detail |\n|---------|--------|\n| 🎯 USP | **Government Mid-day Meals** via Akshaya Patra + Azim Premji Foundation SNF |\n| 🍱 Mid-day Meals | ✅ **Nutritious meals (milk/ragi malt) by Akshaya Patra** + daily SNF (eggs, chikki, bananas) sponsored by Azim Premji Foundation & Dept. of Education |\n| 🚌 Transport | ❌ **No school bus service** |\n| 🎖️ NCC | Active unit |\n| 📚 Competitive Exam Support | NMMS coaching, CHARD GK exams, Hindi/Sanskrit exams, Ramayana/Mahabharata exams — **up to ₹12,000 financial aid** |\n| 🎺 Unique Clubs | **Bugle Band Set**, Girl Guide, Electoral Literacy Club |\n| 🌿 Eco-Friendly | Handcrafted natural clay Ganesha idols for festivals |\n| 🎵 Heritage | Inter High School Music Competition since 1966 (Golden Jubilee 2015) |\n| 💎 Milestones | Diamond Jubilee (60 yrs) in 2023, Golden Jubilee 2011 |\n| 🏗️ Infrastructure | AC Auditorium (500+ seats), Science Lab, Computer Lab, AV Room, Library, Sports Room, Canteen |\n| 📞 Phone | 080-2657 7792, +91-9036876165 |\n| 📧 Email | rvghs@rvei.edu.in |\n| 📍 Address | RV Teachers College Building, 15, Ashoka Pillar Road, 2nd Block, Jayanagar, Bengaluru - 560011 |\n| 🕐 Office Hours | Mon–Fri: 9:00 AM–4:30 PM, Sat: 9:00 AM–1:00 PM |\n\n### Language Combinations\n| Section | 1st Language | 2nd Language | 3rd Language |\n|---------|-------------|-------------|-------------|\n| Section A | Sanskrit | Kannada | English |\n| Section B | English | Kannada | Sanskrit |\n| Section C | Kannada | English | Hindi |\n\n**Core Subjects:** Mathematics, General Science, Social Science\n**Co-Curricular:** Physical Education, Craft & SUPW, Computer Education\n\n### Required Admission Documents\n1. Original SATS Transfer Certificate (with PEN & Aadhaar)\n2. Passport photo of student\n3. Birth Certificate copy\n4. Previous class Marks Card copy\n5. Bhagyalakshmi Bond copy (if applicable)\n6. DISE number from previous school\n7. Caste Certificate copy\n8. Parent's Income Certificate copy\n9. Student & Parents' Aadhaar Cards\n10. Student Bank Passbook (front page)\n11. BPL Card copy (if applicable)\n12. DDPI Permission Order (if transferring from Central to State syllabus)\n\n### 12 Active Clubs\n| # | Club | Highlights |\n|---|------|-----------|\n| 1 | Student Union Club | Organizes school trips, singing competitions |\n| 2 | Humanities Club | |\n| 3 | Electoral Literacy Club | Civic awareness |\n| 4 | Science Club | Online experiments, research tasks |\n| 5 | Sanskrit Club | |\n| 6 | Kannada Sangha | |\n| 7 | Health Club | |\n| 8 | Eco Club | Eco-friendly initiatives |\n| 9 | NCC | National Cadet Corps |\n| 10 | Sports Club | Indoor & outdoor |\n| 11 | Bugle Band Set | Unique to RVGHS |\n| 12 | Girl Guide | |\n\n### Academic Calendar (2025-26)\n| Assessment | Month |\n|-----------|-------|\n| FA 1 | July 2025 |\n| FA 2 | August 2025 |\n| SA 1 | September 2025 |\n| Mid-term holidays | Sep 20 – Oct 7, 2025 |\n| FA 3 | November 2025 |\n| Class 10 Preparatory | Dec 2025 & Jan 2026 |\n| FA 4 | January 2026 |\n| SA 2 (Class 8 & 9) | March 2026 |\n| Summer Holidays | Apr 11 – May 28, 2026 |\n\n### Chatbot Flow\n\n```mermaid\nflowchart TD\n    A[\"👋 Welcome to RV Girls\\nHigh School, Jayanagar!\\nNurturing Growing Minds\\nSince 1962 | ~400 Students\\nHow can I help?\"]\n\n    A --> B[\"📚 Admissions\"]\n    A --> C[\"🏫 About RVGHS\"]\n    A --> D[\"📖 Academics & Subjects\"]\n    A --> E[\"🎯 Beyond Academics & Clubs\"]\n    A --> F[\"📊 Results\"]\n    A --> G[\"🍱 Mid-day Meals\"]\n    A --> H[\"📞 Contact Us\"]\n    A --> I[\"❤️ Donate\"]\n    A --> J[\"🏗️ Infrastructure\"]\n    A --> K[\"📅 Academic Calendar\"]\n\n    %% ADMISSIONS\n    B --> B1[\"Admission is simple\\nand hassle-free.\"]\n    B1 --> B2[\"Documents Required:\\n• SATS TC (with PEN/Aadhaar)\\n• Passport photo\\n• Birth Certificate\\n• Previous Marks Card\\n• Caste & Income Certificates\\n• Aadhaar (student + parents)\\n• Bank Passbook copy\\n• BPL Card (if applicable)\\n• Bhagyalakshmi Bond (if applicable)\"]\n    B2 --> B3[\"📥 Download Brochure PDF\\n\\nWould you like to:\\n1. Visit the School\\n2. Call: 080-2657 7792\\n3. Email: rvghs@rvei.edu.in\"]\n\n    %% ABOUT\n    C --> C1[\"RVGHS was founded on\\n7th June 1962 with just\\n25 girls. Today we have\\n~400 students.\\nDiamond Jubilee in 2023!\"]\n    C1 --> C2[\"1. Our Pioneers & History\\n2. Board of Management\\n3. Achievements & Reports\\n4. Alumni Network\"]\n    C2 --> C2a[\"Founded by Sri M.C.\\nSivananda Sarma.\\nFirst HM: Sri K. Nanjundaswamy\\n(1962-1988)\"]\n    C2 --> C2b[\"→ /board_of_management/\"]\n    C2 --> C2c[\"→ /achievements/\\n→ /reports/\"]\n    C2 --> C2d[\"Join Alumni:\\nrvghs.almaconnect.com\"]\n\n    %% MID-DAY MEALS (UNIQUE)\n    G --> G1[\"✅ Yes! RVGHS provides\\nGovernment Mid-day Meals:\\n\\n🍱 Akshaya Patra Foundation\\nprovides nutritious meals\\n(incl. milk/ragi malt)\\n\\n🥚 Daily SNF provided by\\nAzim Premji Foundation +\\nDept. of Education\\n(eggs, chikki, or bananas)\"]\n\n    %% ACADEMICS\n    D --> D1[\"Karnataka State Board\"]\n    D1 --> D1a[\"📘 Language Options:\\nSec A: Sanskrit/Kannada/English\\nSec B: English/Kannada/Sanskrit\\nSec C: Kannada/English/Hindi\"]\n    D1 --> D1b[\"📚 Core: Maths, Science,\\nSocial Science\"]\n    D1 --> D1c[\"🎨 Co-curricular: PE,\\nCraft & SUPW, Computer Ed\"]\n    D1 --> D1d[\"🏆 Competitive Exams:\\nNMMS, CHARD GK, Hindi/Sanskrit\\nRamayana/Mahabharata\\n→ Up to ₹12,000 financial aid\"]\n\n    %% CLUBS\n    E --> E1[\"12 Active Clubs:\"]\n    E1 --> E1a[\"🎭 Student Union, Humanities,\\nElectoral Literacy, Science,\\nSanskrit, Kannada Sangha\"]\n    E1 --> E1b[\"💪 Health, Eco, NCC,\\nSports, Bugle Band Set,\\nGirl Guide\"]\n    E1 --> E1c[\"🎪 Events: Annual Day,\\nSports Meet, Independence Day,\\nRepublic Day, Children's Day,\\nKannada Rajyotsava,\\nGanesha Festival (eco-friendly)\"]\n\n    %% RESULTS\n    F --> F1[\"Download Result PDFs:\\n📊 2024-25 (Latest)\\n📊 2023-24\\n📊 2022-23\\n📊 2021-22\"]\n\n    %% INFRASTRUCTURE\n    J --> J1[\"🔬 Science Lab\\n💻 Computer Lab (networked)\\n📚 Library (with LCD projector)\\n📺 Audio-Visual Room\\n🏟️ Sports Room + Playground\\n🎭 AC Auditorium (500+ seats)\\n🍽️ Canteen\"]\n\n    %% CALENDAR\n    K --> K1[\"📅 2025-26 Calendar:\\nFA1: July | FA2: Aug\\nSA1: Sep | FA3: Nov\\nFA4: Jan | SA2: March\\nMid-term: Sep 20 - Oct 7\\nSummer: Apr 11 - May 28\"]\n\n    %% CONTACT\n    H --> H1[\"📍 RV Teachers College Bldg,\\n15, Ashoka Pillar Road,\\n2nd Block, Jayanagar,\\nBengaluru - 560011\\n📞 080-2657 7792\\n📱 +91-9036876165\\n📧 rvghs@rvei.edu.in\\n🕐 Mon-Fri: 9AM-4:30PM\\n🕐 Sat: 9AM-1PM\"]\n\n    %% DONATE\n    I --> I1[\"Support girls' education:\\nrvinstitutions.com/donate/\"]\n```\n\n### School-Specific FAQs\n| Question | Answer |\n|----------|--------|\n| \"Does RVGHS provide lunch?\" | ✅ Yes! Government mid-day meals by Akshaya Patra Foundation (milk/ragi malt). Plus daily SNF (eggs, chikki, bananas) by Azim Premji Foundation. |\n| \"Is there a school bus?\" | ❌ No bus service. The school is located in Jayanagar (well-connected by public transport). |\n| \"Is it only for girls?\" | Yes, RVGHS is an all-girls high school. |\n| \"What board?\" | Karnataka State Board. |\n| \"How old is the school?\" | Founded 7th June 1962 — over 60 years! Diamond Jubilee celebrated in 2023. |\n| \"What documents for admission?\" | SATS TC, Birth Certificate, Marks Card, Caste/Income Certificates, Aadhaar, Bank Passbook, BPL Card (if applicable). |\n| \"Does the school provide financial help?\" | Students preparing for NMMS and competitive exams can receive up to ₹12,000 in financial assistance. |\n| \"What clubs are available?\" | 12 clubs including NCC, Girl Guide, Bugle Band Set, Science Club, Eco Club, Electoral Literacy Club, and more. |\n| \"What languages are taught?\" | 3 sections: Sanskrit/Kannada/English OR English/Kannada/Sanskrit OR Kannada/English/Hindi. |\n\n---\n\n## 🔄 Cross-School Comparison (Verified)\n\n| Feature | RV School | RV Public School | RV Girls High School |\n|---------|-----------|-----------------|---------------------|\n| **Board** | State Board | **ICSE (CISCE)** | State Board |\n| **Established** | **2018** | 2003 | **1962** |\n| **Grades** | Primary + Secondary | Nursery – Std 10 | High School (Girls) |\n| **Gender** | Co-ed | Co-ed | **Girls Only** |\n| **Campus** | 2 acres, Tata Silk Farm | 2 acres, Lalbagh West Gate | Jayanagar (Ashoka Pillar Rd) |\n| **Students** | — | **1000+** | **~400** |\n| **Teachers** | — | 60 | — |\n| **🚌 Transport** | ❌ No | ✅ **Bus (South B'lore)** | ❌ No |\n| **🍱 Mid-day Meals** | ❌ No (Food Court) | ❌ No | ✅ **Govt (Akshaya Patra + Azim Premji)** |\n| **🏅 Accreditation** | Govt. of Karnataka | **British Council ISA** | — |\n| **♿ Inclusive Ed** | ✅ **Hearing impaired** | — | — |\n| **🏊 Pool** | **Splash Pool** | ❌ | ❌ |\n| **🎖️ NCC** | — | ✅ | ✅ |\n| **🎺 Bugle Band** | — | — | ✅ **Unique** |\n| **👧 Girl Guide** | — | — | ✅ |\n| **🏋️ Sports Partner** | — | **Leapstart** | — |\n| **💰 Financial Aid** | — | — | ✅ **₹12,000 (NMMS etc.)** |\n| **🎵 Music Heritage** | — | — | ✅ **Since 1966** |\n| **❤️ Donate** | ✅ | ❌ | ✅ |\n| **🎓 Alumni Page** | ✅ | ❌ | ✅ (AlmaConnect) |\n| **🏠 Houses** | — | ✅ (4 houses) | — |\n| **🌐 Virtual Tour** | — | ✅ | ✅ (360°) |\n\n---\n\n## 🔄 Common Chatbot Intents (All Schools)\n\n| Intent | Trigger Examples | Response |\n|--------|-----------------|----------|\n| **Greeting** | Hi, Hello, Hey | Welcome message + quick options menu |\n| **Admission** | How to apply, enrollment | School-specific admission flow |\n| **Fee Inquiry** | Fee structure, payment | Contact fee office with school-specific details |\n| **Contact** | Phone, email, address | School-specific contact details |\n| **Working Hours** | School timings, office hours | School-specific timings |\n| **Location** | Where, directions, map | Address + Google Maps link |\n| **Curriculum** | Syllabus, board, subjects | Board + curriculum details |\n| **Transport** | Bus, school bus | **School-specific**: Only RVPS has bus |\n| **Meals/Lunch** | Mid-day meal, lunch, food | **School-specific**: Only RVGHS has govt meals |\n| **Events** | Upcoming events, calendar | Events list / calendar link |\n| **Results** | Board results, toppers | RVPS: ICSE toppers. RVGHS: Result PDFs |\n| **Fallback** | Unrecognized | \"I didn't understand...\" + options |\n| **Human Handoff** | Talk to someone | Transfer to phone/email |\n\n### Fallback Flow\n\n```mermaid\nflowchart TD\n    A[\"❓ I didn't quite\\nunderstand that.\"] --> B[\"Here's what I can\\nhelp you with:\"]\n    B --> C[\"1. 📚 Admissions\\n2. 💰 Fees\\n3. 📞 Contact\\n4. 🏫 About\\n5. 🚌 Transport\\n6. 🍱 Meals\\n7. 🗣️ Talk to a Person\"]\n    C --> D[\"Or type your question\\nand I'll try again!\"]\n```\n\n\n---\n\n# 📊 Technical Resource Footprint & Scalability\n\nThis document outlines the precise technical resources required to host the 3 school chatbots on your existing AWS / cPanel infrastructure, including per-user metrics and scaling considerations.\n\n## 1. Storage & Payload (The Footprint)\nThe chatbots are built entirely as static assets (Vanilla HTML, CSS, JS). There are no server-side scripts (Node/PHP) or databases.\n\n* **HTML Container (`index.html`):** ~2.5 KB\n* **Styling (`index.css`):** ~4.0 KB\n* **Logic & Data (`app.js`):** ~18.0 KB\n* **Total Storage on cPanel/AWS:** **~25 KB per school**\n\nWhen served via cPanel (Apache/LiteSpeed) or AWS CloudFront, gzip/brotli compression will automatically reduce this payload to approximately **8 KB to 10 KB over the wire**.\n\n## 2. Network Bandwidth (Per Person Usage)\nBecause the chatbot relies on a local decision-tree rather than querying an external API for every message, **all network activity happens exactly once upon page load.**\n\n* **Bandwidth per unique visitor:** ~10 KB\n* **Data per chat message:** 0 KB (Zero network calls are made during the chat; all logic executes locally).\n\n| Visitor Volume | Estimated Total Bandwidth | Impact on Hosting |\n| :--- | :--- | :--- |\n| 1 User | 10 Kilobytes | Negligible |\n| 1,000 Users | 10 Megabytes | Negligible |\n| 10,000 Users | 100 Megabytes | Negligible |\n| 100,000 Users | 1 Gigabyte | Minimal (Standard AWS Free Tier covers 100GB+) |\n\n## 3. Computing Resources\n\n### A. Server-Side Compute (cPanel / AWS)\n* **CPU / RAM Impact:** **0%**\n* Because your server is only handing off static text files (`.js`, `.css`), the chatbot consumes no active CPU cycles or RAM on your backend. There are no active WebSocket connections or database queries to keep open.\n\n### B. Client-Side Compute (Visitor's Device)\n* **CPU Impact:** < 5ms execution time for parsing the JS tree.\n* **RAM Impact:** < 2 MB memory footprint in the browser tab.\n* The chatbot runs smoothly on low-end 3G smartphones due to its reliance on standard DOM manipulation rather than heavy frameworks (like React/Vue).\n\n## 4. Scalability & Adding Future Users\nThe architecture of this chatbot makes it **infinitely scalable**.\n\n* **No Backend Bottlenecks:** Traditional chatbots often crash under heavy load because thousands of concurrent users overload the database or hit API rate limits. \n* **CDN Ready:** If traffic spikes (e.g., during admission season), AWS CloudFront or Cloudflare will cache the 25 KB payload at the edge. \n* **1 to 1,000,000 Users:** The server handles 1 user exactly the same way it handles 1 million users — by simply serving a cached static file. Your existing website infrastructure will not feel any strain.\n\n## 5. Adding New Features or Schools\nIf you wish to scale the *capabilities* of the bot (e.g., adding more FAQs or new departments):\n* **Data Structure:** The data is strictly separated in a `SCHOOLS` object inside `app.js`.\n* **Resource Cost to update:** Adding 50 new Q&A pairs will only increase the file size by ~2 KB. It will not require any changes to your server architecture or database provisioning.\n\n## 6. 3-Year Resource Approximation (Cost Projection)\nGiven the \"serverless\" client-side nature of the chatbot, hosting it alongside your existing AWS/cPanel infrastructure incurs near-zero additional overhead. Here is an approximation for a 3-year span assuming aggressive scaling:\n\n| Metric | Year 1 (Current) | Year 2 (Growth) | Year 3 (Scale) |\n| :--- | :--- | :--- | :--- |\n| **Estimated Users/Year** | 10,000 Users | 50,000 Users | 100,000 Users |\n| **Per User Network Cost** | ~10 KB | ~10 KB | ~10 KB |\n| **Total Annual Bandwidth** | 100 MB | 500 MB | 1 GB |\n| **Compute/Processing Cost** | $0 (Client-side) | $0 (Client-side) | $0 (Client-side) |\n| **Database Storage Cost** | $0 (No DB needed) | $0 (No DB needed) | $0 (No DB needed) |\n| **Approx AWS/cPanel Cost** | **$0.00** | **$0.00** | **$0.00** |\n\n**Conclusion for 3 Years:** Because the chatbots are purely static HTML/CSS/JS (no databases, no backend servers, no third-party API subscriptions), they essentially piggyback off your existing website hosting for free. Over a 3-year span, scaling from 10k to 100k users will cost absolutely nothing in additional computing resources.\n";
