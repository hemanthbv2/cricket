<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CrickDesk - Premium Office Cricket Tournament Manager. Track scores, stats, and standings with style.">
  <meta name="theme-color" content="#0a0e1a">
  <title>CrickDesk - Cricket Tournament Manager</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>

  <!-- Sidebar Toggle (Mobile) -->
  <button id="sidebar-toggle" aria-label="Toggle navigation menu">☰</button>

  <!-- Sidebar Overlay (Mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- App Shell -->
  <div id="app">

    <!-- Sidebar Navigation -->
    <nav id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">🏏</div>
          <div class="logo-text">
            <h2>CrickDesk</h2>
            <span>Tournament Manager</span>
          </div>
        </div>
      </div>

      <ul class="sidebar-nav">
        <li class="nav-item active" data-page="dashboard" id="nav-dashboard">
          <span class="nav-icon">📊</span>
          <span class="nav-label">Dashboard</span>
        </li>
        <li class="nav-item" data-page="teams" id="nav-teams">
          <span class="nav-icon">👥</span>
          <span class="nav-label">Teams</span>
        </li>
        <li class="nav-item" data-page="players" id="nav-players">
          <span class="nav-icon">🏏</span>
          <span class="nav-label">Players</span>
        </li>
        <li class="nav-item" data-page="tournament" id="nav-tournament">
          <span class="nav-icon">🏆</span>
          <span class="nav-label">Tournament</span>
        </li>
        <li class="nav-item" data-page="fixtures" id="nav-fixtures">
          <span class="nav-icon">📅</span>
          <span class="nav-label">Fixtures</span>
        </li>
        <li class="nav-item" data-page="scoring" id="nav-scoring">
          <span class="nav-icon">🎯</span>
          <span class="nav-label">Scoring</span>
        </li>
        <li class="nav-item" data-page="stats" id="nav-stats">
          <span class="nav-icon">📈</span>
          <span class="nav-label">Stats</span>
        </li>
        <li class="nav-item" data-page="share" id="nav-share">
          <span class="nav-icon">📤</span>
          <span class="nav-label">Share</span>
        </li>
        <li class="nav-item" data-page="halloffame" id="nav-halloffame">
          <span class="nav-icon">🏅</span>
          <span class="nav-label">Hall of Fame</span>
        </li>
      </ul>

      <div class="sidebar-footer">
        <button class="btn btn-secondary btn-sm" id="btn-export-data">
          📥 Export Data
        </button>
        <button class="btn btn-secondary btn-sm" id="btn-import-data">
          📤 Import Data
        </button>
        <button class="btn btn-primary btn-sm" id="btn-seed-demo">
          🎲 Seed Demo Data
        </button>
      </div>
    </nav>

    <!-- Main Content Area -->
    <main id="main-content">
      <div id="page-dashboard" class="page active"></div>
      <div id="page-teams" class="page"></div>
      <div id="page-players" class="page"></div>
      <div id="page-tournament" class="page"></div>
      <div id="page-fixtures" class="page"></div>
      <div id="page-scoring" class="page"></div>
      <div id="page-stats" class="page"></div>
      <div id="page-share" class="page"></div>
      <div id="page-halloffame" class="page"></div>
    </main>

  </div>

  <!-- Modal Container -->
  <div id="modal-container"></div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Hidden file input for JSON import -->
  <input type="file" id="import-file-input" accept=".json" style="display: none;">

  <!-- Scripts (order matters) -->
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/teams.js"></script>
  <script src="js/players.js"></script>
  <script src="js/tournament.js"></script>
  <script src="js/fixtures.js"></script>
  <script src="js/scoring.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/share.js"></script>
  <script src="js/halloffame.js"></script>
</body>
</html>
